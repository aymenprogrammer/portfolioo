<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Test</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="logo">
            <h1>Hello ... 👋</h1>
        </div>

        <div class="hero">
            <p><i>Your first step towards digital success</i></p>
            <h1>
                I Help You For Make<br>
                Your Ideas <span>Online 👨‍💻</span><br>
            </h1>
            <img src="assets/coding.gif">

            <div class="btn">
                <a class="btn" href="#contact">
                    Contact Me
                    <i class="fa-solid fa-paper-plane"></i>
                </a>
            </div>
        </div>

        <!-- Start Project -->
        <section class="projects" id="projects">
            <div class="container">
                <div class="top_section">
                    <h2>My <span>Projects</span></h2>
                </div>


                <div id="projects-container"></div>
                <script>
                    // دالة لجلب البيانات من ملف JSON
                    fetch('data.json')
                        .then(response => response.json())
                        .then(data => {
                            const container = document.getElementById('projects-container');

                            data.forEach(project => {
                                const projectBox = `
                                <div class="project_box ${project.class}">
                                    <div class="text">
                                        <h3><a href="#">[${project.id}] ${project.title}</a></h3>
                                        <p>${project.description}</p>
                                        <a href="${project.link}" target="_blank" class="link"><i class="fa-solid fa-arrow-up"></i></a>
                                        </div>
                                        <img src="${project.image}" alt="">
                                        </div>`;

                                container.innerHTML += projectBox;
                            });
                        })
                        .catch(error => console.error('Error fetching data:', error));
                </script>

            </div>
        </section>

        <section class="skills" id="skills">
            <div class="container">
                <div class="top_section">
                    <h2>My <span>Skills</span></h2>
                </div>

                <div class="box">
                    <div class="skill">
                        <h3>HTML</h3>
                        <i class="fa-brands fa-html5"></i>
                    </div>

                    <div class="skill">
                        <h3>CSS</h3>
                        <i class="fa-brands fa-css3-alt"></i>
                    </div>

                    <div class="skill">
                        <h3>JAVASCRIPT</h3>
                        <i class="fa-brands fa-js"></i>
                    </div>

                    <div class="skill">
                        <h3>REACT</h3>
                        <i class="fa-brands fa-react"></i>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <!-- Start Contact -->
    <section class="contact" id="contact">
        <div class="container">
            <div class="top_section">
                <h2>Contact <span>Me</span></h2>
            </div>

            <div class="soial_contact">
                <div class="links">
                    <a href="https://www.instagram.com/a.aymen_dev/" target="_blank"><i
                            class="fa-brands fa-instagram"></i> instagram</a>
                    <a href="mailto:aymen.dev10@gmail.com" target="_blank"><i class="fa-solid fa-envelope"></i>
                        aymen.dev10@gmail.com</a>
                </div>
            </div>
        </div>
    </section>
    <!-- End Contact -->
</body>

</html>
